version: "3.8"

services:
  backend1:
    build: ./backend
    environment:
      - PORT=3000
    ports:
      - "3000:3000"

  backend2:
    build: ./backend
    environment:
      - PORT=3001
    ports:
      - "3001:3001"

  nginx:
    image: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf

  haproxy:
    image: haproxy
    ports:
      - "8080:8080"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg