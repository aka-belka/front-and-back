<!DOCTYPE html>

<head>

    <link rel="manifest" href="./manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#302a24">
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon-120x120.png">
